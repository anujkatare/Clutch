name: C++ CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Build Tools
      run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      
    - name: Configure CMake
      run: cmake -B build
      
    - name: Build Project
      run: cmake --build build